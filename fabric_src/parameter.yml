# parameter.yml for fabric-cicd
# https://microsoft.github.io/fabric-cicd/latest/how_to/parameterization/
#
# The "environment" key passed to FabricWorkspace selects which replacement
# value is used. _ALL_ applies to every environment.

find_replace:
    # Source lakehouse GUID embedded in the notebook metadata.
    # Replace with the deployed lakehouse id in the target workspace.
    - find_value: "3169a0db-1de9-41e3-804c-9b0e6aaf505e"
      replace_value:
          _ALL_: "$items.Lakehouse.AI_Foundry_Control_Tower.$id"
      item_type: ["Notebook", "SemanticModel"]

    # Source workspace GUID embedded in the notebook metadata.
    # Replace with the target workspace id.
    - find_value: "187645de-b325-455e-85ca-08f47beac19e"
      replace_value:
          _ALL_: "$workspace.$id"
      item_type: ["Notebook", "SemanticModel"]

    # Source workspace display name baked into the OneLake abfss URI.
    # Replace with the target workspace display name. Pulled from the
    # FABRIC_WORKSPACE_NAME environment variable (fabric-cicd v1.0.0 does not
    # support the $workspace.$name dynamic variable).
    - find_value: "AI_Control_Tower_v2"
      replace_value:
          _ALL_: "$ENV:FABRIC_WORKSPACE_NAME"
      item_type: "Notebook"

    # Azure resource group name baked into Log Analytics / App Insights resource
    # IDs across notebook, KQL queryset and KQL dashboard files. Pulled from
    # the FABRIC_RESOURCE_GROUP environment variable via fabric-cicd's
    # enable_environment_variable_replacement feature flag.
    - find_value: "rg-aictt-dev"
      replace_value:
          _ALL_: "$ENV:FABRIC_RESOURCE_GROUP"
      item_type: ["Notebook", "KQLQueryset", "KQLDashboard"]

    # Azure subscription ID baked into Log Analytics / App Insights resource
    # IDs across notebook, KQL queryset and KQL dashboard files. Pulled from
    # the FABRIC_SUBSCRIPTION_ID environment variable.
    - find_value: "873a4995-e21b-47e2-953e-f2e88e2fa4f9"
      replace_value:
          _ALL_: "$ENV:FABRIC_SUBSCRIPTION_ID"
      item_type: ["Notebook", "KQLQueryset", "KQLDashboard"]

    # Log Analytics workspace name baked into resource IDs across notebook,
    # KQL queryset and KQL dashboard files. Pulled from the FABRIC_LAW_NAME
    # environment variable.
    - find_value: "aictt-law-dev"
      replace_value:
          _ALL_: "$ENV:FABRIC_LAW_NAME"
      item_type: ["Notebook", "KQLQueryset", "KQLDashboard"]

    # Application Insights component name baked into resource IDs across
    # notebook, KQL queryset and KQL dashboard files. Pulled from the
    # FABRIC_AI_NAME environment variable.
    - find_value: "aictt-ai-dev"
      replace_value:
          _ALL_: "$ENV:FABRIC_AI_NAME"
      item_type: ["Notebook", "KQLQueryset", "KQLDashboard"]

    # ADLS Gen2 storage account name baked into the Lakehouse shortcuts
    # (shortcuts.metadata.json) as https://<account>.dfs.core.windows.net.
    # Pulled from the FABRIC_STORAGE_ACCOUNT environment variable.
    - find_value: "aicttsadev"
      replace_value:
          _ALL_: "$ENV:FABRIC_STORAGE_ACCOUNT"
      item_type: "Lakehouse"

    # Fabric cloud connection GUID bound to the ADLS Gen2 shortcuts in
    # shortcuts.metadata.json. The connection's configured URL in the target
    # Fabric tenant must exactly match the shortcut location
    # (https://<FABRIC_STORAGE_ACCOUNT>.dfs.core.windows.net) or Fabric returns
    # DMTSConnectionServerAndTargetPathMismatch. Pulled from the
    # FABRIC_ADLS_CONNECTION_ID environment variable.
    - find_value: "9a59d63e-fb44-4338-9fcf-da6b0569ace4"
      replace_value:
          _ALL_: "$ENV:FABRIC_ADLS_CONNECTION_ID"
      item_type: "Lakehouse"

