<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Control Tower</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1a1a2e;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 28px;
            width: 100%;
            max-width: 680px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        select, textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: #333;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, textarea:focus {
            border-color: #4f7df3;
            background: #fff;
        }

        select { margin-bottom: 18px; }

        textarea {
            resize: vertical;
            min-height: 100px;
            margin-bottom: 18px;
        }

        button {
            background: #4f7df3;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background: #3a65d6; }
        button:disabled { background: #a5b4fc; cursor: not-allowed; }

        .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .btn-sim {
            background: #10b981;
        }
        .btn-sim:hover:not(:disabled) { background: #059669; }
        .btn-sim.running { background: #dc2626; }
        .btn-sim.running:hover:not(:disabled) { background: #b91c1c; }

        .sim-log {
            margin-top: 18px;
            max-height: 220px;
            overflow-y: auto;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 12px 14px;
            font-family: ui-monospace, Menlo, Consolas, monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            display: none;
        }
        .sim-log.visible { display: block; }
        .sim-log .row { padding: 2px 0; border-bottom: 1px solid #1e293b; }
        .sim-log .agent { color: #38bdf8; font-weight: 600; }
        .sim-log .ok { color: #4ade80; }
        .sim-log .err { color: #f87171; }

        .response-box {
            margin-top: 24px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
            display: none;
        }

        .response-box.visible { display: block; }

        .response-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }

        .response-text {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 14px;
            font-size: 0.92rem;
            line-height: 1.65;
            white-space: pre-wrap;
            color: #222;
            min-height: 60px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.5);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error { color: #dc2626; }
    </style>
</head>
<body>
    <h1>Agent Control Tower</h1>
    <div class="card">
        <label for="agent-select">Agent</label>
        <select id="agent-select">
            <option value="support">Support Agent</option>
            <option value="doc">Documentation Agent</option>
            <option value="customer">Customer Agent</option>
        </select>

        <label for="prompt-input">Prompt</label>
        <textarea id="prompt-input" placeholder="Type your question here..."></textarea>

        <div class="btn-row">
            <button id="send-btn" onclick="sendPrompt()">Send</button>
            <button id="sim-btn" class="btn-sim" onclick="toggleSim()">Start Sim</button>
        </div>

        <div class="response-box" id="response-box">
            <div class="response-label">Response</div>
            <div class="response-text" id="response-text"></div>
        </div>

        <div class="sim-log" id="sim-log"></div>
    </div>

    <script>
        async function sendPrompt() {
            const agent = document.getElementById('agent-select').value;
            const prompt = document.getElementById('prompt-input').value.trim();
            const btn = document.getElementById('send-btn');
            const box = document.getElementById('response-box');
            const out = document.getElementById('response-text');

            if (!prompt) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Thinking...';
            box.classList.add('visible');
            out.textContent = '';
            out.classList.remove('error');

            try {
                const res = await fetch(`/${agent}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: prompt })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }

                const data = await res.json();
                out.textContent = data.response ?? JSON.stringify(data, null, 2);
            } catch (err) {
                out.textContent = `Error: ${err.message}`;
                out.classList.add('error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send';
            }
        }

        document.getElementById('prompt-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                sendPrompt();
            }
        });

        const SIM_AGENTS = ['support', 'doc', 'customer'];
        const SIM_PROMPTS = [
            'How do I reset my password?',
            'What are your business hours?',
            'Where can I find the user guide?',
            'My order has not arrived yet.',
            'Can you explain the refund policy?',
            'How do I upgrade my subscription?',
            'I need help configuring my account.',
            'What features are included in the free tier?',
            'How do I contact a human agent?',
            'Show me the latest release notes.',
            'I am getting an error when logging in.',
            'Can you summarize the onboarding steps?'
        ];
        const SIM_MIN_DELAY_MS = 1500;
        const SIM_MAX_DELAY_MS = 4500;

        let simRunning = false;
        let simTimer = null;

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function logSim(agent, prompt, status, detail) {
            const log = document.getElementById('sim-log');
            log.classList.add('visible');
            const row = document.createElement('div');
            row.className = 'row';
            const time = new Date().toLocaleTimeString();
            const cls = status === 'ok' ? 'ok' : status === 'err' ? 'err' : '';
            row.innerHTML = `[${time}] <span class="agent">${agent}</span> "${prompt}" <span class="${cls}">${detail}</span>`;
            log.prepend(row);
        }

        async function fireSim() {
            const agent = pick(SIM_AGENTS);
            const prompt = pick(SIM_PROMPTS);
            const started = performance.now();
            try {
                const res = await fetch(`/${agent}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: prompt })
                });
                const elapsed = Math.round(performance.now() - started);
                if (!res.ok) {
                    logSim(agent, prompt, 'err', `HTTP ${res.status} (${elapsed}ms)`);
                    return;
                }
                const data = await res.json().catch(() => null);
                const reply = (data && (data.response ?? JSON.stringify(data))) || '(empty)';
                const snippet = reply.length > 160 ? reply.slice(0, 160) + '…' : reply;
                logSim(agent, prompt, 'ok', `${elapsed}ms → ${snippet}`);
            } catch (err) {
                logSim(agent, prompt, 'err', err.message);
            }
        }

        function scheduleSim() {
            if (!simRunning) return;
            const delay = SIM_MIN_DELAY_MS + Math.random() * (SIM_MAX_DELAY_MS - SIM_MIN_DELAY_MS);
            simTimer = setTimeout(async () => {
                if (!simRunning) return;
                fireSim();
                scheduleSim();
            }, delay);
        }

        function toggleSim() {
            const btn = document.getElementById('sim-btn');
            simRunning = !simRunning;
            if (simRunning) {
                btn.textContent = 'Stop Sim';
                btn.classList.add('running');
                fireSim();
                scheduleSim();
            } else {
                btn.textContent = 'Start Sim';
                btn.classList.remove('running');
                if (simTimer) { clearTimeout(simTimer); simTimer = null; }
            }
        }
    </script>
</body>
</html>
