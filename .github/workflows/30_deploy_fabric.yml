name: 30 Deploy Fabric

on:
  push:
    branches: [main]
    paths:
      - "fabric_src/**"
      - "fabric_cicd/**"
      - "script/03_deploy_fabric.ps1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Fabric
        shell: pwsh
        run: ./script/03_deploy_fabric.ps1
